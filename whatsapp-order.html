<section class="whatsapp-order">

    <h1>Place Order via WhatsApp</h1>

    <p>
        Fill the details below and continue directly to WhatsApp.
    </p>

    <form id="whatsappForm">

        <input type="text" id="name" placeholder="Full Name" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <input type="text" id="location" placeholder="City / Location" required>

        <select id="rice">
            <option>Traditional Rice</option>
            <option>Rice Flour</option>
            <option>Millets</option>
            <option>Protein Mix</option>
            <option>Sathu Maavu</option>
            <option>Health Powder</option>
        </select>

        <input type="text"
        id="quantity"
        placeholder="Quantity (Kg)">

        <textarea
        id="message"
        placeholder="Additional Requirements"></textarea>

        <button
        type="button"
        onclick="sendWhatsApp()">
            Continue to WhatsApp
        </button>

    </form>

</section>

<script src="script.js"></script>
